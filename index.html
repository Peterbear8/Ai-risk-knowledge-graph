  {id:"RS-D1.1-001",sub:"D1.1",title:"標籤翻轉攻擊導致分類模型誤判",en:"Label flipping attack causes misclassification",desc:"攻擊者將訓練資料中的標籤刻意翻轉（例如將「正常」標成「異常」），使模型學到錯誤的分類邏輯，部署後在特定情境下系統性地做出錯誤判斷。",severity:4,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Design and Development"],sysType:["Traditional ML", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Data Poisoning",atlas:"AML.T0020",iso:"R2"}},
  {id:"RS-D1.1-002",sub:"D1.1",title:"後門觸發器植入訓練資料集",en:"Backdoor trigger injection into training dataset",desc:"攻擊者在訓練資料中植入特定的觸發模式（如圖片角落的小圖案），模型在正常輸入下表現正常，但一旦遇到含有觸發器的輸入就會產出攻擊者預設的結果。",severity:5,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Design and Development"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Data Poisoning",atlas:"AML.T0020",iso:"R2"}},

  {id:"RS-D1.2-005",sub:"D1.2",title:"時序偏移導致模型預測偏差",en:"Temporal drift causes prediction bias",desc:"模型部署後，真實世界的資料分布會隨時間變化（如消費行為、市場趨勢），但模型仍基於舊有分布做預測，導致對特定群體的偏差逐漸加大。",severity:3,source:"AI-System",actor:["Operation & Monitoring", "TEVV"],timing:["Operation and Monitoring", "Re-evaluation"],sysType:["Traditional ML", "Recommender System"],industry:["Finance"],twP:["公平與不歧視"],twT:1,refs:{iso:"R3"}},
  {id:"RS-D1.3-001",sub:"D1.3",title:"LLM（Large Language Model） 記憶訓練資料中的個人身份資訊",en:"LLM memorizes PII from training data",desc:"LLM 在訓練過程中會記憶訓練資料中出現的個人身份資訊（如姓名、身份證號、電話），使用者透過特定提示就能誘導模型逐字輸出這些敏感資料。",severity:5,source:"AI-System",actor:["AI Development", "AI Design"],timing:["Design and Development", "Operation and Monitoring"],sysType:["LLM Application", "RAG System"],industry:["Finance", "Healthcare"],twP:["隱私保護與資料治理"],twT:1,refs:{cosai:"Privacy Violation",owasp:"LLM06",iso:"R1"}},
  {id:"RS-D1.3-002",sub:"D1.3",title:"模型反推攻擊還原訓練資料",en:"Model inversion attack reconstructs training data",desc:"攻擊者利用模型的輸出結果，透過數學最佳化技術反向推導出訓練資料的原始內容，例如從醫療模型中還原出病患的面部影像或診斷記錄。",severity:4,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["Deep Learning", "Traditional ML"],industry:["Healthcare"],twP:["隱私保護與資料治理"],twT:1,refs:{atlas:"AML.T0025",iso:"R1"}},
  {id:"RS-D1.3-003",sub:"D1.3",title:"成員推斷攻擊判定個人資料是否被用於訓練",en:"Membership inference attack determines if data was used in training",desc:"攻擊者向模型查詢特定個人的資料特徵，透過分析模型的回應信心度，判斷該個人的資料是否曾被用於模型訓練，進而推斷其曾使用過哪些服務。",severity:3,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["Traditional ML", "Deep Learning"],industry:["Healthcare", "Finance"],twP:["隱私保護與資料治理"],twT:1,refs:{atlas:"AML.T0024",iso:"R1"}},
  {id:"RS-D1.3-004",sub:"D1.3",title:"RAG（Retrieval-Augmented Generation） 系統檢索到含有敏感個資的文件",en:"RAG system retrieves documents containing sensitive PII",desc:"RAG 系統在檢索企業內部文件時，未能過濾含有敏感個資的段落，直接將這些內容注入 LLM 的上下文中，再透過生成的回答間接洩露給查詢者。",severity:4,source:"AI-System",actor:["AI Development", "AI Deployment"],timing:["Operation and Monitoring"],sysType:["RAG System"],industry:["Finance", "Legal"],twP:["隱私保護與資料治理"],twT:1,refs:{owasp:"LLM06",iso:"R1"}},
  {id:"RS-D1.3-005",sub:"D1.3",title:"AI 推斷使用者未揭露的健康狀態",en:"AI infers user health conditions not disclosed",desc:"AI 系統透過分析使用者的行為模式、購買紀錄或搜尋歷史，推斷出使用者未主動揭露的健康狀況，例如從購物紀錄推測懷孕，侵害資訊自主權。",severity:4,source:"AI-System",actor:["AI Design", "TEVV"],timing:["Operation and Monitoring"],sysType:["Traditional ML", "Recommender System"],industry:["Healthcare"],twP:["隱私保護與資料治理"],twT:1,refs:{iso:"R1"}},

  {id:"RS-D2.1-001",sub:"D2.1",title:"對抗性貼片使物件偵測模型失效",en:"Adversarial patch causes object detection model failure",desc:"攻擊者將特製的圖案貼在實體物件上，使電腦視覺模型無法正確辨識目標。例如在停車標誌上貼上擾動貼片，導致自動駕駛系統忽略該標誌。",severity:5,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["Computer Vision", "Deep Learning"],industry:["Manufacturing", "Government"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0048",iso:"R2"}},
  {id:"RS-D2.1-002",sub:"D2.1",title:"文字對抗樣本繞過垃圾郵件分類器",en:"Textual adversarial examples bypass spam classifier",desc:"攻擊者在垃圾郵件中插入特殊字元、同形字或不可見字符，使文字分類模型將惡意郵件判定為正常信件，繞過過濾機制。",severity:3,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["Traditional ML", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0048",iso:"R2"}},
  {id:"RS-D2.1-003",sub:"D2.1",title:"語音對抗攻擊欺騙語音辨識系統",en:"Audio adversarial attack deceives speech recognition",desc:"攻擊者在音訊中嵌入人耳無法察覺的擾動信號，使語音助理或語音辨識系統將其解碼為預設的惡意指令，可能觸發未授權操作。",severity:4,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0048",iso:"R2"}},
  {id:"RS-D2.1-004",sub:"D2.1",title:"逃逸攻擊使惡意軟體繞過 AI 偵測",en:"Evasion attack allows malware to bypass AI detection",desc:"惡意軟體作者對程式碼進行微小修改，使基於機器學習的防毒或入侵偵測系統無法識別已知威脅，讓惡意程式順利進入目標系統。",severity:5,source:"Human-External",actor:["AI Development", "Operation & Monitoring"],timing:["Operation and Monitoring"],sysType:["Deep Learning", "Traditional ML"],industry:["General"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0015",iso:"R2"}},
  {id:"RS-D2.1-005",sub:"D2.1",title:"對抗性擾動導致自駕車誤判交通標誌",en:"Adversarial perturbation causes autonomous vehicle to misread traffic signs",desc:"攻擊者在交通標誌上施加細微的視覺擾動，使自動駕駛車輛的視覺模型將停止標誌誤認為速限標誌，可能導致嚴重交通事故。",severity:5,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["Computer Vision", "Deep Learning"],industry:["Manufacturing"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0048",iso:"R2"}},
  {id:"RS-D2.2-001",sub:"D2.2",title:"間接提示注入透過外部文件操控 RAG（Retrieval-Augmented Generation） 系統",en:"Indirect prompt injection via external documents in RAG",desc:"攻擊者在公開文件或網頁中埋入隱藏指令，當 RAG 系統檢索到這些內容時，LLM 會將其當作指令執行，可能洩露內部資料或執行惡意操作。",severity:5,source:"Human-External",actor:["AI Development", "AI Deployment", "TEVV"],timing:["Design and Development", "Operation and Monitoring"],sysType:["RAG System", "LLM Application", "AI Agent"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Prompt Injection",atlas:"AML.T0051",owasp:"LLM01",iso:"R2"}},
  {id:"RS-D2.2-002",sub:"D2.2",title:"直接提示注入繞過系統安全限制",en:"Direct prompt injection bypasses system safety restrictions",desc:"使用者在輸入中直接嵌入指令，如「忽略以上所有指示」，誘導 LLM 突破預設的安全護欄，輸出原本被禁止的內容或執行受限操作。",severity:4,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["LLM Application", "AI Agent"],industry:["General"],twP:["資安與安全"],twT:1,refs:{owasp:"LLM01",iso:"R2"}},
  {id:"RS-D2.2-003",sub:"D2.2",title:"多輪對話逐步引導 LLM（Large Language Model） 洩露系統提示",en:"Multi-turn conversation gradually extracts system prompt",desc:"攻擊者透過精心設計的多輪對話，逐步套取 LLM 的系統提示詞內容，暴露應用的內部邏輯、業務規則和安全策略。",severity:3,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{owasp:"LLM01",iso:"R2"}},
  {id:"RS-D2.2-004",sub:"D2.2",title:"圖片中隱藏指令觸發多模態模型執行惡意動作",en:"Hidden instructions in images trigger multimodal model malicious actions",desc:"攻擊者在圖片的不可見區域（如白色文字或極小字體）嵌入指令，當多模態模型處理該圖片時會讀取並執行這些隱藏指令。",severity:5,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["LLM Application", "AI Agent"],industry:["General"],twP:["資安與安全"],twT:1,refs:{owasp:"LLM01",iso:"R2"}},
  {id:"RS-D2.2-005",sub:"D2.2",title:"MCP（Model Context Protocol） 工具描述中植入提示注入指令",en:"Prompt injection via MCP tool descriptions",desc:"攻擊者在 MCP Server 的工具描述欄位中嵌入惡意指令，當 AI Agent 讀取工具清單時自動執行未授權操作，可能導致敏感資料外洩或系統權限被濫用。",severity:5,source:"Human-External",actor:["AI Development", "AI Deployment"],timing:["Deployment", "Operation and Monitoring"],sysType:["AI Agent", "Multi-Agent System"],industry:["General"],twP:["資安與安全"],twT:1,refs:{owasp:"LLM01",iso:"R2"}},
  {id:"RS-D2.3-001",sub:"D2.3",title:"攻擊者透過 API（Application Programming Interface） 大量查詢竊取模型能力",en:"Model extraction via excessive API queries",desc:"攻擊者系統性地向模型 API 發送大量精心設計的查詢，收集輸入輸出對，訓練出功能相近的替代模型，竊取原始模型的智慧財產。",severity:4,source:"Human-External",actor:["AI Deployment", "Operation & Monitoring"],timing:["Operation and Monitoring"],sysType:["LLM Application", "Traditional ML"],industry:["Finance"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0024",iso:"R2"}},
  {id:"RS-D2.3-002",sub:"D2.3",title:"側通道攻擊推斷模型架構與超參數",en:"Side-channel attack infers model architecture and hyperparameters",desc:"攻擊者透過分析 API 回應時間、記憶體使用量或功耗等側通道資訊，推斷模型的內部架構和超參數設定，為後續攻擊奠定基礎。",severity:3,source:"Human-External",actor:["AI Deployment", "TEVV"],timing:["Operation and Monitoring"],sysType:["Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0024",iso:"R2"}},
  {id:"RS-D2.3-003",sub:"D2.3",title:"競爭對手透過蒸餾技術複製模型能力",en:"Competitor replicates model via distillation techniques",desc:"競爭對手利用知識蒸餾技術，以目標模型的輸出作為訓練信號，建立一個規模較小但能力相近的複製模型，侵害原始模型的商業價值。",severity:3,source:"Human-External",actor:["AI Deployment"],timing:["Operation and Monitoring"],sysType:["LLM Application", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{atlas:"AML.T0024",iso:"R2"}},
  {id:"RS-D2.3-004",sub:"D2.3",title:"開放權重模型被逆向工程提取訓練細節",en:"Open-weight model reverse-engineered for training details",desc:"研究者或競爭對手對公開釋出的模型權重進行逆向分析，推斷出訓練資料的特徵、來源或敏感資訊，即使模型提供者並未打算公開這些細節。",severity:2,source:"Human-External",actor:["AI Design"],timing:["Deployment"],sysType:["LLM Application", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D2.3-005",sub:"D2.3",title:"嵌入向量洩露語義資訊被用於重建原始資料",en:"Embedding vectors leak semantic info for data reconstruction",desc:"攻擊者取得 RAG 系統或向量資料庫中的嵌入向量後，利用反向映射技術還原出原始文字內容，導致敏感的企業文件或個人資料外洩。",severity:4,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["RAG System", "Deep Learning"],industry:["Finance", "Healthcare"],twP:["資安與安全"],twT:1,refs:{iso:"R1"}},
  {id:"RS-D2.4-001",sub:"D2.4",title:"RAG（Retrieval-Augmented Generation） 系統因檢索不當產生事實性幻覺",en:"RAG hallucination from poor retrieval",desc:"RAG 系統檢索到不相關或過時的文件片段，LLM 基於錯誤的上下文生成看似正確但實際有誤的回答，在醫療或法律場景中可能造成嚴重後果。",severity:4,source:"AI-System",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["RAG System", "LLM Application"],industry:["Healthcare", "Legal"],twP:["透明與可解釋"],twT:1,refs:{owasp:"LLM09",iso:"R5"}},
  {id:"RS-D2.4-002",sub:"D2.4",title:"LLM（Large Language Model） 生成虛構的學術引用和法律案例",en:"LLM generates fabricated academic citations and legal cases",desc:"LLM 在回答中自信地引用不存在的學術論文、虛構的法律判例或編造的統計數據，使用者若未查證便可能在正式場合引用錯誤資訊。",severity:4,source:"AI-System",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["LLM Application"],industry:["Legal", "Education"],twP:["透明與可解釋"],twT:1,refs:{owasp:"LLM09",iso:"R5"}},
  {id:"RS-D2.4-003",sub:"D2.4",title:"多步推理鏈中的錯誤累積導致結論謬誤",en:"Error accumulation in multi-step reasoning chains",desc:"AI Agent 在執行多步驟推理時，早期步驟的小誤差會隨著推理鏈傳播並放大，導致最終結論完全偏離事實，且中間過程難以被人類審查。",severity:3,source:"AI-System",actor:["AI Development"],timing:["Operation and Monitoring"],sysType:["LLM Application", "AI Agent"],industry:["General"],twP:["透明與可解釋"],twT:1,refs:{iso:"R5"}},
  {id:"RS-D2.4-004",sub:"D2.4",title:"模型自信地輸出過時資訊",en:"Model confidently outputs outdated information",desc:"LLM 的訓練資料有時間截止點，但在回答時不會主動提示資訊可能已過時，使用者可能據此做出基於過期法規、價格或政策的錯誤決策。",severity:3,source:"AI-System",actor:["AI Development", "Operation & Monitoring"],timing:["Operation and Monitoring", "Re-evaluation"],sysType:["LLM Application"],industry:["General"],twP:["透明與可解釋"],twT:1,refs:{iso:"R5"}},
  {id:"RS-D2.4-005",sub:"D2.4",title:"數值計算錯誤被包裝在流暢的敘述中",en:"Numerical errors wrapped in fluent narrative",desc:"LLM 在進行數學運算或財務計算時產生錯誤結果，但因為輸出的文字敘述極為流暢自然，使用者很難察覺數字本身是錯的，在金融分析中尤其危險。",severity:3,source:"AI-System",actor:["AI Development", "TEVV"],timing:["Operation and Monitoring"],sysType:["LLM Application"],industry:["Finance"],twP:["透明與可解釋"],twT:1,refs:{iso:"R5"}},
  {id:"RS-D3.1-001",sub:"D3.1",title:"惡意第三方模型預埋後門",en:"Backdoor in third-party pre-trained model",desc:"攻擊者在公開模型平台上發布含有隱藏後門的預訓練模型，組織下載後直接使用或微調，後門在特定觸發條件下被啟動，可能導致系統被遠端控制。",severity:5,source:"Human-External",actor:["AI Design", "TEVV"],timing:["Design and Development", "Deployment"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Model Source Tampering",owasp:"LLM05",iso:"R2"}},
  {id:"RS-D3.1-002",sub:"D3.1",title:"Python 套件依賴中的惡意程式碼",en:"Malicious code in Python package dependencies",desc:"AI 專案依賴的 Python 套件（如 PyPI 上的套件）中被注入惡意程式碼，在安裝或執行時竊取環境變數、API 金鑰或訓練資料。",severity:4,source:"Human-External",actor:["AI Development", "AI Deployment"],timing:["Design and Development"],sysType:["LLM Application", "Deep Learning", "Traditional ML"],industry:["General"],twP:["資安與安全"],twT:1,refs:{owasp:"LLM05",iso:"R2"}},
  {id:"RS-D3.1-003",sub:"D3.1",title:"模型權重下載過程中被中間人攻擊篡改",en:"Model weights tampered during download via MITM attack",desc:"模型權重檔案在從模型倉庫下載到本地的過程中，被中間人攻擊者攔截並替換為含有後門的版本，組織在不知情的情況下部署了被篡改的模型。",severity:4,source:"Human-External",actor:["AI Deployment", "TEVV"],timing:["Deployment"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Model Source Tampering",iso:"R2"}},
  {id:"RS-D3.1-004",sub:"D3.1",title:"容器映像檔中包含已知漏洞的 ML 框架",en:"Container image contains ML framework with known vulnerabilities",desc:"用於部署模型的 Docker 容器映像檔中，包含了有已知安全漏洞的舊版 ML 框架（如 TensorFlow、PyTorch），攻擊者可利用這些漏洞入侵系統。",severity:3,source:"Human-Internal",actor:["AI Deployment"],timing:["Deployment"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.1-005",sub:"D3.1",title:"HuggingFace 模型倉庫中的序列化攻擊",en:"Serialization attack in HuggingFace model repository",desc:"攻擊者將惡意的序列化物件偽裝成正常的模型檔案上傳到 HuggingFace，當使用者載入該檔案時會自動執行惡意程式碼，取得系統控制權。",severity:4,source:"Human-External",actor:["AI Design", "TEVV"],timing:["Design and Development"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{owasp:"LLM05",iso:"R2"}},
  {id:"RS-D3.2-001",sub:"D3.2",title:"訓練完成的模型權重被內部人員竄改",en:"Trained model weights tampered by insider",desc:"擁有模型存取權限的內部人員，故意修改已訓練完成的模型權重，植入偏見或後門，由於修改幅度微小，常規測試可能無法偵測到異常。",severity:4,source:"Human-Internal",actor:["AI Development", "Operation & Monitoring"],timing:["Design and Development", "Deployment"],sysType:["Deep Learning", "LLM Application"],industry:["Finance"],twP:["資安與安全"],twT:1,refs:{cosai:"Model Source Tampering",iso:"R2"}},
  {id:"RS-D3.2-002",sub:"D3.2",title:"模型版本管理混亂導致部署錯誤版本",en:"Model version management chaos leads to wrong version deployment",desc:"組織缺乏嚴格的模型版本管理流程，導致開發環境的實驗版模型被誤部署到生產環境，可能出現未經充分測試的行為或安全漏洞。",severity:3,source:"Human-Internal",actor:["AI Deployment", "Operation & Monitoring"],timing:["Deployment"],sysType:["Traditional ML", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.2-003",sub:"D3.2",title:"CI/CD（Continuous Integration/Continuous Delivery） 管道被入侵導致模型被替換",en:"CI/CD pipeline compromised leading to model replacement",desc:"攻擊者入侵 CI/CD 管道後，在自動化部署流程中將正常模型替換為惡意版本，由於部署是自動化的，替換行為可能在相當長時間後才被發現。",severity:5,source:"Human-External",actor:["AI Deployment", "TEVV"],timing:["Deployment"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Model Source Tampering",iso:"R2"}},
  {id:"RS-D3.2-004",sub:"D3.2",title:"模型配置檔被未授權修改改變行為",en:"Model config file unauthorized modification changes behavior",desc:"模型的配置檔（如推論參數、溫度設定、安全過濾規則）被未經授權的人員修改，導致模型行為改變，例如關閉安全過濾器使模型輸出不當內容。",severity:3,source:"Human-Internal",actor:["AI Deployment"],timing:["Deployment", "Operation and Monitoring"],sysType:["LLM Application", "AI Agent"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.2-005",sub:"D3.2",title:"微調後的 LoRA（Low-Rank Adaptation）適配器被惡意替換",en:"Fine-tuned LoRA (Low-Rank Adaptation) adapter maliciously replaced",desc:"攻擊者將惡意的 LoRA 適配器發布到模型分享平台，或在組織內部替換已部署的適配器，使微調後的模型在特定情境下產出攻擊者預設的有害內容。",severity:4,source:"Human-External",actor:["AI Development", "TEVV"],timing:["Deployment"],sysType:["LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{cosai:"Model Source Tampering",iso:"R2"}},
  {id:"RS-D3.3-001",sub:"D3.3",title:"模型推論 API（Application Programming Interface） 端點缺乏存取控制",en:"Inference API endpoint lacks access control",desc:"模型推論服務的 API 端點缺乏適當的身份驗證和授權機制，任何人都可以直接呼叫 API 進行推論，甚至存取模型的內部狀態或管理功能。",severity:4,source:"Human-Internal",actor:["AI Deployment", "Operation & Monitoring"],timing:["Deployment", "Operation and Monitoring"],sysType:["LLM Application", "RAG System", "AI Agent"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.3-002",sub:"D3.3",title:"向量資料庫未加密儲存敏感嵌入",en:"Vector database stores sensitive embeddings unencrypted",desc:"RAG 系統使用的向量資料庫以明文方式儲存文件的嵌入向量，攻擊者取得資料庫存取權後可還原出原始文件內容，包含敏感的企業機密或個人資料。",severity:4,source:"Human-Internal",actor:["AI Deployment"],timing:["Deployment"],sysType:["RAG System"],industry:["Finance", "Healthcare"],twP:["資安與安全"],twT:1,refs:{iso:"R1"}},
  {id:"RS-D3.3-003",sub:"D3.3",title:"GPU（Graphics Processing Unit） 共享環境中的側通道資訊洩露",en:"Side-channel information leakage in shared GPU environment",desc:"在多租戶的雲端 GPU 環境中，攻擊者可能透過 GPU 記憶體殘留、快取側通道等方式，推斷出同一台機器上其他租戶的模型資訊或訓練資料。",severity:3,source:"Systemic",actor:["AI Deployment", "TEVV"],timing:["Operation and Monitoring"],sysType:["Deep Learning", "LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.3-004",sub:"D3.3",title:"模型服務容器逃逸攻擊",en:"Model serving container escape attack",desc:"攻擊者利用模型服務容器中的漏洞實現容器逃逸，取得宿主機的控制權，進而存取同一台機器上其他服務的資料，造成大規模安全事件。",severity:5,source:"Human-External",actor:["AI Deployment"],timing:["Operation and Monitoring"],sysType:["LLM Application", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.3-005",sub:"D3.3",title:"日誌系統記錄了使用者的完整提示內容",en:"Logging system records full user prompts",desc:"系統的日誌機制記錄了使用者傳送給 AI 的完整提示內容，包含可能的敏感資訊（如個人資料、商業機密），這些日誌若被不當存取將造成隱私洩露。",severity:3,source:"Human-Internal",actor:["AI Deployment", "Operation & Monitoring"],timing:["Operation and Monitoring"],sysType:["LLM Application", "AI Agent"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R1"}},
  {id:"RS-D3.4-001",sub:"D3.4",title:"惡意使用者透過複雜提示耗盡 GPU（Graphics Processing Unit） 資源",en:"Malicious user exhausts GPU resources via complex prompts",desc:"惡意使用者刻意傳送極長或結構複雜的提示，迫使 LLM 消耗大量的 GPU 運算資源和記憶體，導致服務回應時間大幅增加甚至完全不可用。",severity:3,source:"Human-External",actor:["AI Deployment", "Operation & Monitoring"],timing:["Operation and Monitoring"],sysType:["LLM Application"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},
  {id:"RS-D3.4-002",sub:"D3.4",title:"AI Agent 無限遞迴呼叫導致運算資源耗盡",en:"AI Agent infinite recursive calls exhaust compute resources",desc:"AI Agent 在推理過程中陷入無限迴圈，不斷呼叫自身或其他 Agent，快速耗盡運算資源和 API 配額，同時產生大量無意義的日誌和網路流量。",severity:4,source:"AI-System",actor:["AI Development", "Operation & Monitoring"],timing:["Operation and Monitoring"],sysType:["AI Agent", "Multi-Agent System"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R5"}},
  {id:"RS-D3.4-003",sub:"D3.4",title:"分散式推論服務遭受 DDoS（Distributed Denial of Service） 攻擊",en:"Distributed inference service hit by DDoS attack",desc:"攻擊者對 AI 推論服務發動大規模分散式阻斷服務攻擊，利用大量並發請求癱瘓服務，影響所有依賴該 AI 服務的下游應用。",severity:4,source:"Human-External",actor:["AI Deployment"],timing:["Operation and Monitoring"],sysType:["LLM Application", "Deep Learning"],industry:["General"],twP:["資安與安全"],twT:1,refs:{iso:"R2"}},

function buildGraphData(filter, viewMode) {
  const domainMap = {};
  DOMAINS.forEach(d => domainMap[d.id] = d);
  const subMap = {};
  SUBDOMAINS.forEach(s => subMap[s.id] = s);
  const nodes = [];
  const links = [];
  const nodeSet = new Set();
  const addNode = (id, obj) => { if (!nodeSet.has(id)) { nodeSet.add(id); nodes.push(obj); } };

  let filtered = SCENARIOS;
  if (filter.sysType) filtered = filtered.filter(s => s.sysType.includes(filter.sysType));
  if (filter.subdomain) filtered = filtered.filter(s => s.sub === filter.subdomain);
  else if (filter.domain) filtered = filtered.filter(s => subMap[s.sub]?.domain === filter.domain);
  if (filter.minSeverity > 1) filtered = filtered.filter(s => s.severity >= filter.minSeverity);
  if (filter.search) {
    const q = filter.search.toLowerCase();
    filtered = filtered.filter(s => s.title.toLowerCase().includes(q) || s.en.toLowerCase().includes(q) || (s.desc||"").toLowerCase().includes(q) || s.sub.toLowerCase().includes(q) || s.sysType.some(t => (SYS_TYPE_ZH[t]||t).toLowerCase().includes(q) || t.toLowerCase().includes(q)) || s.industry.some(i => i.toLowerCase().includes(q)));
  }

  // 顏色計算函數：根據 viewMode 決定節點顏色
  const getScenarioColor = (sc) => {
    if (viewMode === "principle") return TW_P_COLOR[sc.twP?.[0]] || "#666";
    if (viewMode === "riskType") return TW_T_COLOR[sc.twT] || "#666";
    return domainMap[subMap[sc.sub]?.domain]?.color || "#999";
  };
  const getSubdomainColor = (s) => {
    if (viewMode === "domain") return domainMap[s.domain]?.color || "#999";
    // 原則/類型模式下，subdomain 用淡灰，讓 scenario 顏色更突出
    return "#445566";
  };
  const getDomainNodeColor = (d) => {
    if (viewMode === "domain") return d.color;
    return "#445566";
  };

  const usedSubs = new Set(filtered.map(s => s.sub));
  const usedDomains = new Set([...usedSubs].map(s => subMap[s]?.domain));

  DOMAINS.filter(d => usedDomains.has(d.id)).forEach(d => {
    addNode(d.id, { id: d.id, label: d.name, type: "domain", color: getDomainNodeColor(d), r: 28 });
  });

  SUBDOMAINS.filter(s => usedSubs.has(s.id)).forEach(s => {
    const d = domainMap[s.domain];
    addNode(s.id, { id: s.id, label: s.name, type: "subdomain", color: getSubdomainColor(s), r: 16 });
    links.push({ source: s.id, target: s.domain, type: "part_of", color: getSubdomainColor(s), width: 2.5 });
  });

  filtered.forEach(sc => {
    const color = getScenarioColor(sc);
    addNode(sc.id, { id: sc.id, label: sc.title, en: sc.en, desc: sc.desc, type: "scenario", color, r: 4 + sc.severity * 2, severity: sc.severity, source: sc.source, actor: sc.actor, timing: sc.timing, sysType: sc.sysType, industry: sc.industry, refs: sc.refs, twP: sc.twP, twT: sc.twT });
    links.push({ source: sc.id, target: sc.sub, type: "belongs_to", color: "#444", width: 0.8 });
  });

  const usedScIds = new Set(filtered.map(s => s.id));
  CONTROLS.forEach(c => {
    const linked = c.scenarios.filter(s => usedScIds.has(s));
    if (linked.length > 0) {
      addNode(c.id, { id: c.id, label: c.name, type: "control", color: "#27AE60", r: 7, controlType: c.type });
      linked.forEach(sId => {
        links.push({ source: c.id, target: sId, type: "mitigated_by", color: "#27AE6066", width: 0.6, dashed: true });
      });
    }
  });

  const usedTypes = new Set();
  filtered.forEach(sc => sc.sysType.forEach(t => usedTypes.add(t)));
  usedTypes.forEach(t => {
    addNode("ST-"+t, { id: "ST-"+t, label: SYS_TYPE_ZH[t]||t, type: "sysType", color: "#8E44AD", r: 13 });
  });
  filtered.forEach(sc => {
    sc.sysType.forEach(t => {
      links.push({ source: sc.id, target: "ST-"+t, type: "affects", color: "#8E44AD44", width: 0.5, dashed: true });
    });
  });

  return { nodes, links };
}

function AIRiskKnowledgeGraph() {
  const svgRef = useRef(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const [filter, setFilter] = useState({ sysType: null, domain: null, subdomain: null, search: "", minSeverity: 1 });
  const [graphData, setGraphData] = useState({ nodes: [], links: [] });
  const [showFilters, setShowFilters] = useState(false);
  const [viewMode, setViewMode] = useState("domain"); // "domain" | "principle" | "riskType"

  useEffect(() => {
    setGraphData(buildGraphData(filter, viewMode));
  }, [filter, viewMode]);

  const handleNodeClick = useCallback((d) => {
    if (d.type === "subdomain") {
      setFilter(f => ({ ...f, subdomain: f.subdomain === d.id ? null : d.id, domain: null, sysType: null }));
      setSelectedNode(d);
    } else if (d.type === "domain") {
      setFilter(f => ({ ...f, domain: f.domain === d.id ? null : d.id, subdomain: null, sysType: null }));
      setSelectedNode(d);
    } else {
      setSelectedNode(d);
    }
  }, []);

  useEffect(() => {
    if (!svgRef.current || graphData.nodes.length === 0) return;
    const container = svgRef.current.parentElement;
    const width = container.clientWidth;
    const height = container.clientHeight;

    d3.select(svgRef.current).selectAll("*").remove();
    const svg = d3.select(svgRef.current).attr("width", width).attr("height", height);
    const g = svg.append("g");

    const zoom = d3.zoom().scaleExtent([0.2, 5]).on("zoom", (event) => {
      g.attr("transform", event.transform);
    });
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.55));

    const sim = d3.forceSimulation(graphData.nodes)
      .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(d => {
        if (d.type === "part_of") return 55;
        if (d.type === "belongs_to") return 35;
        if (d.type === "affects") return 120;
        return 60;
      }).strength(d => d.type === "part_of" ? 0.7 : d.type === "belongs_to" ? 0.5 : 0.08))
      .force("charge", d3.forceManyBody().strength(d => d.type === "domain" ? -500 : d.type === "subdomain" ? -150 : d.type === "sysType" ? -200 : -30))
      .force("center", d3.forceCenter(0, 0).strength(0.05))
      .force("collision", d3.forceCollide().radius(d => d.r + 2));

    const link = g.append("g").selectAll("line").data(graphData.links).join("line")
      .attr("stroke", d => d.color || "#333").attr("stroke-width", d => d.width || 0.8)
      .attr("stroke-opacity", d => d.type === "affects" || d.type === "mitigated_by" ? 0.25 : 0.5)
      .attr("stroke-dasharray", d => d.dashed ? "3,3" : null);

    const node = g.append("g").selectAll("g").data(graphData.nodes).join("g")
      .style("cursor", "pointer");

    node.each(function(d) {
      const el = d3.select(this);
      if (d.type === "control") {
        const s = d.r * 1.3;
        el.append("path").attr("d", `M0,${-s} L${s},0 L0,${s} L${-s},0 Z`)
          .attr("fill", d.color).attr("stroke", "#ffffff33").attr("stroke-width", 0.5).attr("opacity", 0.8);
      } else if (d.type === "sysType") {
        const s = d.r;
        const hex = d3.range(6).map(i => { const a = Math.PI/3*i - Math.PI/6; return [s*Math.cos(a), s*Math.sin(a)]; });
        el.append("polygon").attr("points", hex.map(p => p.join(",")).join(" "))
          .attr("fill", d.color).attr("stroke", "#ffffff44").attr("stroke-width", 0.5).attr("opacity", 0.85);
      } else {
        el.append("circle").attr("r", d.r)
          .attr("fill", d.color)
          .attr("stroke", d.type === "domain" ? "#ffffff88" : "none")
          .attr("stroke-width", d.type === "domain" ? 2 : 0)
          .attr("opacity", d.type === "scenario" ? 0.75 : 0.9);
      }
    });

    node.filter(d => d.type !== "scenario" && d.type !== "control").append("text")
      .text(d => d.label.length > 8 ? d.label.slice(0, 7) + "…" : d.label)
      .attr("text-anchor", "middle").attr("dy", d => d.r + 13)
      .attr("fill", "#bbb").attr("font-size", d => d.type === "domain" ? 14 : 11)
      .attr("font-family", "'Noto Sans TC',sans-serif")
      .style("pointer-events", "none");

    node.on("click", (event, d) => { event.stopPropagation(); handleNodeClick(d); });
    svg.on("click", () => setSelectedNode(null));

    const drag = d3.drag()
      .on("start", (event, d) => { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on("end", (event, d) => { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
    node.call(drag);

    sim.on("tick", () => {
      link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    return () => sim.stop();
  }, [graphData, handleNodeClick]);

  const af = filter.sysType || filter.domain || filter.subdomain || filter.search || filter.minSeverity > 1;

  return (
    <div style={{width:"100vw",height:"100vh",background:"#0a0a1a",display:"flex",flexDirection:"column",fontFamily:"'Noto Sans TC',sans-serif",overflow:"hidden",position:"relative"}}>
      <div style={{padding:"10px 16px 4px",background:"linear-gradient(180deg,#16213e 0%,#0a0a1a 100%)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:"#fff",letterSpacing:1}}>🕸️ AI 風險知識圖譜 <span style={{fontSize:15,color:"#556",fontWeight:400}}>v1.0</span></div>
            <div style={{fontSize:13,color:"#556",marginTop:1}}>
              AI Risk Knowledge Graph — Designed by Peter Pan（潘世鳴）
              <a href="https://www.linkedin.com/in/%E6%BD%98%E4%B8%96%E9%B3%B4shih-ming-pan-peter-b6671677" target="_blank" rel="noopener noreferrer" style={{color:"#4fc3f7",marginLeft:8,textDecoration:"none",fontSize:12}}>📬 Contact me</a>
              <a href="3d.html" style={{color:"#ce93d8",marginLeft:8,textDecoration:"none",fontSize:12}}>🌐 3D 版本</a>
              <span style={{marginLeft:8,fontSize:12,color:"#556"}}>瀏覽人次: <img src="https://count.getloli.com/get/@peterbear8-ai-risk-kg?theme=rule34" alt="visitors" style={{height:14,verticalAlign:"middle"}} /></span>
            </div>
          </div>
          <button onClick={()=>setShowFilters(v=>!v)} style={{background:showFilters?"#0f3460":"#1a1a2e",border:"1px solid #2a2a3e",borderRadius:8,padding:"6px 10px",color:showFilters?"#4fc3f7":"#667",fontSize:14,cursor:"pointer"}}>

            {DOMAINS.map(d=>(
              <span key={d.id} onClick={()=>setFilter(f=>({...f,domain:f.domain===d.id?null:d.id,sysType:null}))} style={{cursor:"pointer",padding:"2px 6px",borderRadius:8,background:filter.domain===d.id?d.color+"25":"transparent",border:filter.domain===d.id?`1px solid ${d.color}50`:"1px solid transparent"}}>
                <span style={{color:d.color}}>●</span> {d.name.replace("風險","")}
              </span>
            ))}
          </div>
        </div>
      )}

      {!showFilters && (
        <div style={{padding:"4px 16px 6px"}}>
          <div style={{display:"flex",gap:4,marginBottom:4}}>
            {[{k:"domain",l:"風險領域"},{k:"principle",l:"🇹🇼 法規原則"},{k:"riskType",l:"🇹🇼 風險類型"}].map(v=>(
              <button key={v.k} onClick={()=>setViewMode(v.k)} style={{...cs,background:viewMode===v.k?"#0f3460":"#1a1a2e",color:viewMode===v.k?"#4fc3f7":"#556",fontSize:13,padding:"2px 8px"}}>
                {v.l}
              </button>
            ))}
            {af && <span style={{color:"#4fc3f7",marginLeft:"auto",cursor:"pointer",fontSize:13}} onClick={()=>setFilter({sysType:null,domain:null,subdomain:null,search:"",minSeverity:1})}>✕ 清除篩選</span>}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,fontSize:13,color:"#556"}}>
            {viewMode==="domain" && DOMAINS.map(d=>(
              <span key={d.id} style={{padding:"1px 4px"}}>
                <span style={{color:d.color}}>●</span> {d.name.replace("風險","")}
              </span>
            ))}
            {viewMode==="principle" && TW_PRINCIPLES.map(p=>(
              <span key={p.id} style={{padding:"1px 4px"}}>
                <span style={{color:p.color}}>●</span> {p.id}
              </span>
            ))}
            {viewMode==="riskType" && TW_RISK_TYPES.map(t=>(
              <span key={t.id} style={{padding:"1px 4px"}}>
                <span style={{color:t.color}}>●</span> {t.name}
              </span>
            ))}
          </div>
        </div>
      )}

      <div style={{flex:1,position:"relative"}}>
        <svg ref={svgRef} style={{width:"100%",height:"100%"}} />
      </div>

      <div style={{padding:"3px 16px 5px",fontSize:13,color:"#334",textAlign:"center",background:"#0a0a1a"}}>
        節點: {graphData.nodes.length} | 邊: {graphData.links.length} | 情境: {graphData.nodes.filter(n=>n.type==="scenario").length} | 控制: {graphData.nodes.filter(n=>n.type==="control").length}
      </div>

      <DetailPanel node={selectedNode} onClose={()=>setSelectedNode(null)} />
    </div>
  );
}

const cs = {border:"1px solid #2a2a3e",borderRadius:14,padding:"4px 10px",fontSize:14,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"'Noto Sans TC',sans-serif"};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AIRiskKnowledgeGraph));
  </script>
</body>
</html>
